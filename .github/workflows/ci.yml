name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 排除大体积依赖（FlagEmbedding/torch）和非测试必需依赖（PySide6/pyinstaller）
          grep -v "FlagEmbedding\|PySide6\|pyinstaller" requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check src/ --select E,F,W --ignore E501 --output-format=github

      - name: Run tests
        run: |
          python -m pytest tests/ --tb=short -q
