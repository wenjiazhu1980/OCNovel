name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # macOS 构建（Apple Silicon）
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # 跳过 FlagEmbedding（拉取 torch，体积过大且打包时已排除）
          grep -v 'FlagEmbedding' requirements.txt | pip install -r /dev/stdin

      - name: Build with PyInstaller
        run: pyinstaller ocnovel.spec --clean --noconfirm

      - name: Ad-hoc sign macOS app
        # 免费的 ad-hoc 签名（无需 Apple Developer 账号）。
        # 重要：
        # 1) 从内往外签名（inside-out），`--deep` 对嵌套 Framework 不可靠；
        # 2) 不启用 `--options runtime`（Hardened Runtime）——ad-hoc 签名下
        #    每个 Mach-O 的 CDHash 各不相同，Hardened Runtime 会触发 library
        #    validation 报 "different Team IDs" 导致 Python.framework 无法加载。
        # 用户首次启动仍需执行 `xattr -cr OCNovel.app` 清除 quarantine 标记。
        run: |
          set -euo pipefail
          APP="dist/OCNovel.app"

          echo "=== 1. 签名所有 .dylib / .so (内层 Mach-O) ==="
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 \
            | xargs -0 -I{} codesign --force --sign - --timestamp=none "{}"

          echo "=== 2. 签名 Python.framework 主二进制及其 bundle ==="
          codesign --force --sign - --timestamp=none \
            "$APP/Contents/Frameworks/Python.framework/Versions/3.11/Python"
          codesign --force --sign - --timestamp=none \
            "$APP/Contents/Frameworks/Python.framework"

          echo "=== 3. 签名其他 Framework（若存在） ==="
          find "$APP" -type d -name "*.framework" -not -path "*Python.framework*" -print0 \
            | xargs -0 -I{} codesign --force --sign - --timestamp=none "{}" || true

          echo "=== 4. 签名主可执行文件 ==="
          codesign --force --sign - --timestamp=none "$APP/Contents/MacOS/OCNovel"

          echo "=== 5. 签名 app bundle 根 ==="
          codesign --force --sign - --timestamp=none "$APP"

          echo "=== 6. 验证 ==="
          codesign --verify --verbose=2 "$APP"

      - name: Package macOS app
        # 使用 ditto 替代 zip：更好地保留 macOS 元数据、符号链接与扩展属性，
        # 避免解压后签名失效。
        run: |
          cd dist
          ditto -c -k --keepParent --sequesterRsrc OCNovel.app ../OCNovel-macOS-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCNovel-macOS-arm64
          path: OCNovel-macOS-arm64.zip
          retention-days: 5

  # ─────────────────────────────────────────────
  # Windows 构建
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # 跳过 FlagEmbedding（拉取 torch，体积过大且打包时已排除）
          (Get-Content requirements.txt) | Where-Object { $_ -notmatch 'FlagEmbedding' } | Set-Content requirements_ci.txt
          pip install -r requirements_ci.txt

      - name: Build with PyInstaller
        run: pyinstaller ocnovel_win.spec --clean --noconfirm

      - name: Package Windows app
        run: Compress-Archive -Path dist/OCNovel -DestinationPath OCNovel-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCNovel-Windows-x64
          path: OCNovel-Windows-x64.zip
          retention-days: 5

  # ─────────────────────────────────────────────
  # 发布 Release
  # ─────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OCNovel-macOS-arm64.zip
            OCNovel-Windows-x64.zip
