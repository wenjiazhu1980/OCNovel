name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # macOS 构建（Apple Silicon）
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # 跳过 FlagEmbedding（拉取 torch，体积过大且打包时已排除）
          grep -v 'FlagEmbedding' requirements.txt | pip install -r /dev/stdin

      - name: Build with PyInstaller
        run: pyinstaller ocnovel.spec --clean --noconfirm

      - name: Ad-hoc sign macOS app
        # 免费的 ad-hoc 签名（无需 Apple Developer 账号）。
        # 主要解决 PyInstaller 打包后双击报"已损坏"的问题；用户首次启动仍需
        # 执行 `xattr -cr OCNovel.app` 清除 quarantine 标记（README 已说明）。
        run: |
          codesign --deep --force --sign - --options runtime dist/OCNovel.app
          codesign --verify --verbose dist/OCNovel.app

      - name: Package macOS app
        run: |
          cd dist
          zip -r -y ../OCNovel-macOS-arm64.zip OCNovel.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCNovel-macOS-arm64
          path: OCNovel-macOS-arm64.zip
          retention-days: 5

  # ─────────────────────────────────────────────
  # Windows 构建
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # 跳过 FlagEmbedding（拉取 torch，体积过大且打包时已排除）
          (Get-Content requirements.txt) | Where-Object { $_ -notmatch 'FlagEmbedding' } | Set-Content requirements_ci.txt
          pip install -r requirements_ci.txt

      - name: Build with PyInstaller
        run: pyinstaller ocnovel_win.spec --clean --noconfirm

      - name: Package Windows app
        run: Compress-Archive -Path dist/OCNovel -DestinationPath OCNovel-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCNovel-Windows-x64
          path: OCNovel-Windows-x64.zip
          retention-days: 5

  # ─────────────────────────────────────────────
  # 发布 Release
  # ─────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OCNovel-macOS-arm64.zip
            OCNovel-Windows-x64.zip
